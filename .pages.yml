media:
  input: public
  output: /
content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/blog
    view:
      fields: [ title, draft, date ]
    fields:
      - { name: author, label: Author, type: string }
      - { name: pubDatetime, label: Date, type: date }
      - { name: modDatetime, label: Date, type: date }
      - { name: title, label: Title, type: string, required: true }
      - { name: ogImage, label: Title, type: string }
      - { name: slug, label: Slug, type: string }
      - { name: featured, label: Featured, type: boolean }
      - { name: draft, label: Draft, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: description, label: Description, type: string }
      - { name: body, label: Body, type: rich-text }
  - name: about
    label: About page
    type: file
    path: src/pages/about.md
    fields:
      - { name: layout, type: string, hidden: true, default: "../layouts/AboutLayout.astro" }
      - { name: title, label: Title, type: string }
      - { name: body, label: Body, type: rich-text, options: { input: public/assets, output: /assets } }
  - name: test
    label: test page
    type: file
    path: src/pages/test.json
    fields:
      - name: sections
        label: Sections
        type: block
        list: true
        blockKey: type
        blocks:
          - name: hero
            fields:
              - name: hero
                type: string
          - name: text
            fields:
              - name: body
                type: rich-text
      - { name: title, label: Title, type: string }
      - { name: body, label: About text, type: rich-text }
      - { name: heroVideo, label: Hero video, type: file, options: { input: public/assets, output: /assets } }
      - { name: vimeoLinks, label: Vimeo links, type: object, list: true, fields: [ { name: vimeoLink, label: Vimeo link, type: string }, { name: vimeoTitle, label: Vimeo title, type: string } ] }
      - { name: instaLink, label: Instagram Link, type: string }
      - { name: phone, label: Phone Number, type: string }
